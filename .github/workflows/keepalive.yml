name: Keepalive backend

# Mantiene el servicio de Render despierto haciendo ping al /api/health.
# Cada petición HTTP entrante resetea el temporizador de auto-suspensión.
#
# Nota: GitHub Actions no garantiza ejecuciones a intervalos cortos. En
# horas pico puede demorar 5-15 min. En la práctica es suficiente para
# mantener Render (spin down a los 15 min de inactividad) despierto.
#
# Se deshabilita solo si el repo pasa 60 días sin actividad.

on:
  schedule:
    - cron: '*/10 * * * *'   # cada 10 minutos
  workflow_dispatch:          # permite lanzarlo manualmente desde la UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /api/health
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: |
          if [ -z "$BACKEND_URL" ]; then
            echo "Falta el secret BACKEND_URL (URL del backend en Render)"
            exit 1
          fi
          # --max-time: si tarda >60s (cold start largo), aborta.
          # --retry: reintenta una vez si falla la primera.
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 60 --retry 1 --retry-delay 5 \
            "$BACKEND_URL/api/health")
          echo "HTTP $code"
          [ "$code" = "200" ]
